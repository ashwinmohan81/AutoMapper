# Acronym -> expansion. Keys/values case-insensitive; both normalised to lowercase.
# These are merged on top of code-level ACRONYM_MAP. Add or override here.
#
# To keep coverage holistic: run `python backend/scripts/mine_acronyms.py` from
# repo root (with backend venv active) to find short tokens in the eval dataset
# that have no expansion. Add any missing tokens here. The test
# test_eval_dataset_acronym_coverage enforces that every such token is in the map.

